<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>KCOZM — Add Styling Package</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../../images/favicon.png" />
  <style>
    :root {
      --gold:#c8a040; --gold-dk:#9a7020; --gold-lt:#fdf8ee;
      --pink:#e91e63; --pk-lt:#fce4ec;
      --ink:#1a1410; --ink-2:#3d3028; --ink-3:#8a7060;
      --surface:#fff; --surface-2:#f9f7f5; --border:#e8e2da; --shadow:0 2px 24px rgba(26,18,8,.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--surface-2);color:var(--ink)}
    .main-panel{min-width:0;overflow-x:hidden}
    .kc-page-content{padding:28px 28px 48px;flex:1;width:100%;min-width:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .kc-bc{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);margin-bottom:22px;animation:fadeUp .4s ease both}
    .kc-bc a{color:var(--gold);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;box-shadow:var(--shadow);animation:fadeUp .45s ease both}
    .form-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--ink);margin-bottom:4px}
    .form-sub{font-size:13px;color:var(--ink-3);margin-bottom:28px}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-bottom:18px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3)}
    .form-input{padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);background:var(--surface);outline:none;transition:all .18s}
    .form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,160,64,.18);background:#fff}
    .form-input::placeholder{color:var(--ink-3)}
    textarea.form-input{font-family:'DM Sans',sans-serif}
    .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:28px;padding-top:28px;border-top:1px solid var(--border)}
    .btn{padding:11px 24px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dk));color:#fff;box-shadow:0 4px 14px rgba(200,160,64,.28)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(200,160,64,.45)}
    .btn-secondary{background:transparent;border:1.5px solid var(--border);color:var(--ink-2)}
    .btn-secondary:hover{border-color:var(--gold);background:var(--gold-lt);color:var(--gold-dk)}
    @media(max-width:600px){.form-card{padding:20px 22px}.form-row{grid-template-columns:1fr}.form-actions{flex-direction:column-reverse}}
  </style>
</head>
<body>
  <div class="main-panel">
    <div class="kc-page-content">
      <nav class="kc-bc">
        <a href="../../index.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <a href="styling.html"><i class="fa-solid fa-wand-magic-sparkles"></i> Styling</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <span>Add Styling Package</span>
      </nav>

      <div class="form-card">
        <h1 class="form-title"><i class="fa-solid fa-sparkles" style="color:var(--gold);margin-right:10px;font-size:22px"></i>Add Styling Package</h1>
        <p class="form-sub">Create a new hair styling or makeup package</p>

        <form class="form-wrapper" onsubmit="handleAddStyling(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Package Name</label>
              <input type="text" class="form-input" id="packageName" placeholder="e.g. Bridal Hair + Makeup, Party Makeover" required>
            </div>
            <div class="form-group">
              <label class="form-label">Package Code</label>
              <input type="text" class="form-input" id="packageCode" placeholder="e.g. SHP001, PMO001" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Base Price (₹)</label>
              <input type="number" class="form-input" id="basePrice" placeholder="e.g. 3000, 5000" min="0" step="10" required>
            </div>
            <div class="form-group">
              <label class="form-label">Duration (Hours)</label>
              <input type="number" class="form-input" id="duration" placeholder="e.g. 2, 3, 4" min="0.5" step="0.5" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-input" id="description" placeholder="e.g. Complete bridal styling package including hair, makeup, jewelry consultation..." style="resize:vertical;min-height:100px" required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Styling Type</label>
              <select class="form-input" id="stylingType" required>
                <option value="">Select type...</option>
                <option value="bridal">Bridal</option>
                <option value="party">Party</option>
                <option value="casual">Casual</option>
                <option value="trial">Trial</option>
                <option value="creative">Creative/Photoshoot</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-input" id="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="seasonal">Seasonal</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Includes Bridal Makeup</label>
              <select class="form-input" id="includesMakeup" required>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Booking Advance (₹)</label>
              <input type="number" class="form-input" id="advance" placeholder="e.g. 1000, 1500" min="0" step="100" required>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="window.location.href='styling.html'">Cancel</button>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Styling Package</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../js/shared-components.js"></script>
  <script>
    KcozmAdmin.init({ activePage:'styling', pageTitle:'Add Styling Package', depth:'../../', addButton:'Back to List', addButtonHref:'styling.html' });

    function handleAddStyling(event) {
      event.preventDefault();
      const packageName = document.getElementById('packageName').value.trim();
      const packageCode = document.getElementById('packageCode').value.trim();
      const basePrice = document.getElementById('basePrice').value;
      const duration = document.getElementById('duration').value;
      const description = document.getElementById('description').value.trim();
      const stylingType = document.getElementById('stylingType').value;
      const status = document.getElementById('status').value;
      const includesMakeup = document.getElementById('includesMakeup').value;
      const advance = document.getElementById('advance').value;

      if (!packageName || !packageCode || !basePrice || !duration || !description || !stylingType || !status || !includesMakeup || !advance) {
        KcozmAdmin.showToast('Please fill all fields', 'error');
        return;
      }

      const newStyling = {
        id: Date.now(),
        name: packageName,
        code: packageCode,
        basePrice: parseInt(basePrice),
        duration: parseFloat(duration),
        description: description,
        type: stylingType,
        status: status,
        includesMakeup: includesMakeup === 'yes',
        advance: parseInt(advance),
        createdAt: new Date().toISOString()
      };

      let stylings = JSON.parse(localStorage.getItem('stylings')) || [];
      stylings.push(newStyling);
      localStorage.setItem('stylings', JSON.stringify(stylings));

      KcozmAdmin.showToast('Styling package added successfully!', 'success');
      setTimeout(() => window.location.href = 'styling.html', 800);
    }
  </script>
</body>
</html>
