<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>KCOZM Admin – Add Bridal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../../images/favicon.png" />

  <style>
    :root {
      --pink:#e91e63; --pink-dark:#c2185b; --pink-soft:#fce4ec; --pink-glow:rgba(233,30,99,0.13);
      --ink:#1a1a2e; --ink-mid:#4a4a6a; --ink-light:#8888aa;
      --surface:#ffffff; --surface-2:#f8f7fc; --border:#ededf5;
      --radius-sm:8px; --radius-md:14px; --radius-lg:20px;
      --shadow-card:0 2px 24px rgba(26,26,46,0.08); --shadow-btn:0 4px 16px rgba(233,30,99,0.32); --t:0.18s ease;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--surface-2)}
    .main-panel{min-width:0;overflow-x:hidden}

    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
    @keyframes fadeUp  {from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none}}

    .kc-page-content{padding:28px 28px 0;flex:1;width:100%;min-width:0}

    /* Breadcrumb */
    .kc-breadcrumb{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;color:var(--ink-light);margin-bottom:22px;animation:fadeDown .4s ease both}
    .kc-breadcrumb a{color:var(--pink);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity var(--t)}
    .kc-breadcrumb a:hover{opacity:.72}
    .kc-breadcrumb .sep{font-size:10px}

    /* Card */
    .kc-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);border:1px solid var(--border);overflow:hidden;animation:fadeUp .45s ease both;width:100%;margin-bottom:28px;min-width:0}

    /* Card Header */
    .kc-card-header{padding:22px 28px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;border-bottom:1px solid var(--border)}
    .kc-title-block{display:flex;align-items:center;gap:14px}
    .kc-icon-wrap{width:46px;height:46px;border-radius:var(--radius-sm);background:var(--pink-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .kc-icon-wrap i{color:var(--pink);font-size:19px}
    .kc-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;color:var(--ink);margin:0;line-height:1.2}
    .kc-title span{display:block;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--ink-light);margin-top:3px}

    /* Card Body */
    .kc-card-body{padding:32px 28px}

    /* Form */
    .form-row{display:grid;gap:20px}
    .form-row.col-2{grid-template-columns:1fr 1fr}
    @media(max-width:640px){.form-row.col-2{grid-template-columns:1fr}}

    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group label{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.7px;color:var(--ink-light)}
    .required-star{color:var(--pink);margin-left:2px}

    .form-control{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--surface-2);outline:none;transition:border-color var(--t),box-shadow var(--t),background var(--t)}
    .form-control:focus{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-glow);background:#fff}
    .form-control::placeholder{color:var(--ink-light)}
    textarea.form-control{resize:vertical;min-height:180px}

    /* Upload Zone */
    .upload-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 16px;text-align:center;cursor:pointer;background:var(--surface-2);transition:border-color var(--t),background var(--t);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:150px}
    .upload-zone:hover,.upload-zone.has-file{border-color:var(--pink);background:#fff5f8}
    .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-zone .uz-icon{font-size:2rem;color:var(--pink);margin-bottom:10px}
    .upload-zone p{margin:0;font-size:13px;color:var(--ink-light)}
    .upload-zone .uz-hint{font-size:11px;color:#bbb;margin-top:4px}

    .img-preview-box{display:none;margin-top:12px;text-align:center}
    .img-preview-box img{max-height:120px;border-radius:var(--radius-sm);box-shadow:0 2px 8px rgba(0,0,0,0.1);object-fit:cover}
    .remove-img-btn{background:none;border:none;color:var(--pink);font-size:12px;cursor:pointer;margin-top:6px;display:block;width:100%;text-align:center}

    /* Divider */
    .section-divider{border:none;border-top:1.5px dashed var(--border);margin:26px 0}
    .section-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-light);margin-bottom:18px}

    /* Action Buttons */
    .form-actions{display:flex;justify-content:flex-end;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px}
    .kc-btn-submit{background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:#fff;border:none;padding:11px 28px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow-btn);transition:opacity var(--t),transform var(--t)}
    .kc-btn-submit:hover{opacity:.9;transform:translateY(-1px)}
    .kc-btn-cancel{background:var(--surface-2);color:var(--ink-mid);border:1.5px solid var(--border);padding:11px 24px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background var(--t)}
    .kc-btn-cancel:hover{background:var(--border)}
  </style>
</head>
<body>

  <div class="main-panel">
    <div class="kc-page-content">

      <nav class="kc-breadcrumb">
        <a href="../../index.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <a href="bridal_tabel.html">Bridal</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <span>Add Bridal</span>
      </nav>

      <div class="kc-card">

        <div class="kc-card-header">
          <div class="kc-title-block">
            <div class="kc-icon-wrap"><i class="fa-solid fa-heart"></i></div>
            <h4 class="kc-title">Add New Bridal<span>Upload a bridal image and add a description</span></h4>
          </div>
        </div>

        <div class="kc-card-body">

          <p class="section-label">Bridal Image</p>
          <div class="form-row">
            <div class="form-group">
              <label>Bridal Image <span class="required-star">*</span></label>
              <div class="upload-zone" id="bridalZone">
                <input type="file" id="bridalInput" accept="image/*"
                  onchange="previewImage(event,'bridalPreviewImg','bridalPreview','bridalZone')">
                <div class="uz-icon"><i class="fa-solid fa-heart"></i></div>
                <p>Click or drag &amp; drop bridal image</p>
                <p class="uz-hint">PNG, JPG, WEBP · max 5MB</p>
              </div>
              <div class="img-preview-box" id="bridalPreview">
                <img id="bridalPreviewImg" src="" alt="Bridal Preview">
                <button class="remove-img-btn"
                  onclick="removeImage('bridalInput','bridalPreviewImg','bridalPreview','bridalZone')">
                  <i class="fa-solid fa-xmark"></i> Remove image
                </button>
              </div>
            </div>
          </div>

          <hr class="section-divider">

          <p class="section-label">Description</p>
          <div class="form-row">
            <div class="form-group">
              <label>Description <span class="required-star">*</span></label>
              <textarea class="form-control" id="bridalDescription"
                placeholder="Describe the bridal package — services included, styling details, duration, pricing, any special notes..."></textarea>
            </div>
          </div>

          <hr class="section-divider">

          <div class="form-actions">
            <button type="button" class="kc-btn-submit" onclick="submitBridal()">
              <i class="fa-solid fa-check"></i> Submit
            </button>
            <button type="button" class="kc-btn-cancel" onclick="location.href='bridal_tabel.html'">
              <i class="fa-solid fa-xmark"></i> Cancel
            </button>
          </div>

        </div><!-- /kc-card-body -->
      </div><!-- /kc-card -->

    </div>
  </div>

  <script src="../../js/shared-components.js"></script>
  <script>
    KcozmAdmin.init({ activePage:'bridal', pageTitle:'Add Bridal', depth:'../../' });
  </script>

  <script>
    function previewImage(event, imgId, boxId, zoneId) {
      var file = event.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { KcozmAdmin.showToast('Image must be under 5MB', 'error'); return; }
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById(imgId).src = e.target.result;
        document.getElementById(boxId).style.display = 'block';
        document.getElementById(zoneId).classList.add('has-file');
      };
      reader.readAsDataURL(file);
    }

    function removeImage(inputId, imgId, boxId, zoneId) {
      document.getElementById(inputId).value = '';
      document.getElementById(imgId).src = '';
      document.getElementById(boxId).style.display = 'none';
      document.getElementById(zoneId).classList.remove('has-file');
    }

    function submitBridal() {
      var image = document.getElementById('bridalInput').files[0];
      var desc  = document.getElementById('bridalDescription').value.trim();
      if (!image) { KcozmAdmin.showToast('Please upload a bridal image', 'error'); return; }
      if (!desc)  { KcozmAdmin.showToast('Please add a description', 'error'); return; }
      KcozmAdmin.showToast('Bridal entry added successfully!', 'success');
      setTimeout(function() { location.href = 'bridal_tabel.html'; }, 1800);
    }
  </script>

</body>
</html>
