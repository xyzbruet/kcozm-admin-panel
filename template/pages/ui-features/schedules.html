<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>KCOZM Admin – Schedules</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../../images/favicon.png"/>
  <style>
    :root {
      --gold:#c8a040; --gold-dk:#a07828; --gold-lt:#fdf6e4; --gold-glow:rgba(200,160,64,.15);
      --pk:#e91e63; --pk-dk:#c2185b; --pk-lt:#fce4ec;
      --ink:#1a1410; --ink-2:#3d3028; --ink-3:#8a7060;
      --surface:#fff; --surface-2:#f9f7f5; --border:#e8e2da;
      --r-sm:8px; --r-md:14px; --r-lg:20px;
      --shadow:0 2px 24px rgba(26,18,8,.08); --t:.18s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--surface-2)}
    .main-panel{min-width:0;overflow-x:hidden}
    .kc-page-content{padding:28px 28px 0;flex:1;width:100%;min-width:0}

    @keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
    @keyframes popIn   {from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

    .kc-bc{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);margin-bottom:22px;animation:fadeDown .4s ease both}
    .kc-bc a{color:var(--gold);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px}
    .kc-bc a:hover{opacity:.75}
    .kc-bc i.sep{font-size:10px}

    /* Card */
    .kc-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .45s ease both;margin-bottom:28px}
    .kc-card-head{padding:20px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
    .kc-head-left{display:flex;align-items:center;gap:14px}
    .kc-icon-wrap{width:46px;height:46px;border-radius:var(--r-sm);background:var(--gold-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .kc-icon-wrap i{color:var(--gold-dk);font-size:19px}
    .kc-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:800;color:var(--ink)}
    .kc-title small{display:block;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--ink-3);margin-top:2px}
    .kc-head-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

    .kc-btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dk));color:#fff;border:none;padding:10px 20px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 4px 14px var(--gold-glow);transition:transform var(--t),box-shadow var(--t);white-space:nowrap}
    .kc-btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(200,160,64,.40)}
    .kc-btn-out{padding:9px 18px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all var(--t);white-space:nowrap}
    .kc-btn-out:hover{border-color:var(--gold);color:var(--gold-dk);background:var(--gold-lt)}

    /* Week nav toolbar */
    .kc-toolbar{padding:14px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--surface-2)}
    .kc-week-nav{display:flex;align-items:center;gap:8px}
    .kc-nav-arrow{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-3);font-size:13px;transition:all var(--t)}
    .kc-nav-arrow:hover{border-color:var(--gold);color:var(--gold-dk);background:var(--gold-lt)}
    .kc-week-label{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:800;color:var(--ink);white-space:nowrap}
    .kc-btn-today{padding:7px 14px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all var(--t)}
    .kc-btn-today:hover{border-color:var(--gold);color:var(--gold-dk);background:var(--gold-lt)}
    .kc-staff-filter{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink-2);background:var(--surface);outline:none;cursor:pointer;transition:border-color var(--t)}
    .kc-staff-filter:focus{border-color:var(--gold)}

    /* Legend */
    .kc-legend{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap}
    .kc-leg{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--ink-3)}
    .kc-leg-dot{width:10px;height:10px;border-radius:3px}

    /* Schedule grid */
    .kc-sched-wrap{overflow-x:auto}
    .kc-sched{display:grid;grid-template-columns:160px repeat(7,1fr);min-width:800px}

    /* Header row */
    .kc-sh-corner{padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3)}
    .kc-sh-day{padding:12px 10px;text-align:center;background:var(--surface-2);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
    .kc-sh-day:last-child{border-right:none}
    .kc-sh-dayname{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3)}
    .kc-sh-date{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:800;color:var(--ink);margin-top:2px}
    .kc-sh-day.today .kc-sh-date{color:var(--gold-dk)}
    .kc-sh-day.today{background:var(--gold-lt)}

    /* Staff row */
    .kc-srow-label{padding:14px 16px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
    .kc-srow-label:last-of-type{border-bottom:none}
    .kc-srow-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:800;color:#fff}
    .kc-srow-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.2}
    .kc-srow-role{font-size:10.5px;color:var(--ink-3)}

    /* Cell */
    .kc-scell{padding:6px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);min-height:72px;background:var(--surface);transition:background var(--t);cursor:pointer;position:relative}
    .kc-scell:hover{background:#fdf8f0}
    .kc-scell:last-child{border-right:none}
    .kc-scell.today{background:#fffcf5}
    .kc-scell.off{background:repeating-linear-gradient(-45deg,var(--surface-2),var(--surface-2) 4px,var(--surface) 4px,var(--surface) 8px);cursor:default}
    .kc-scell.off:hover{background:repeating-linear-gradient(-45deg,var(--surface-2),var(--surface-2) 4px,var(--surface) 4px,var(--surface) 8px)}

    /* Shift block */
    .kc-shift{border-radius:6px;padding:5px 8px;font-size:10.5px;font-weight:600;margin-bottom:3px;line-height:1.3}
    .kc-shift.work  {background:var(--gold-lt);border-left:3px solid var(--gold);color:var(--gold-dk)}
    .kc-shift.leave {background:var(--pk-lt);border-left:3px solid var(--pk);color:var(--pk-dk)}
    .kc-shift.half  {background:#e3f2fd;border-left:3px solid #2196f3;color:#1565c0}
    .kc-shift.off-tag{background:var(--surface-2);border-left:3px solid var(--border);color:var(--ink-3)}

    /* Summary row */
    .kc-summ-label{padding:12px 16px;border-top:2px solid var(--border);background:var(--surface-2);border-right:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3)}
    .kc-summ-cell{padding:12px 10px;border-top:2px solid var(--border);background:var(--surface-2);border-right:1px solid var(--border);text-align:center;font-size:12px;font-weight:700;color:var(--ink-2)}
    .kc-summ-cell:last-child{border-right:none}

    /* Modal */
    .kc-modal-ov{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:2000;backdrop-filter:blur(3px);align-items:center;justify-content:center}
    .kc-modal-ov.show{display:flex}
    .kc-modal{background:var(--surface);border-radius:var(--r-lg);width:min(480px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(26,18,8,.22);animation:popIn .22s ease both}
    .kc-modal-head{padding:22px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .kc-modal-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:800;color:var(--ink)}
    .kc-modal-close{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-3);font-size:14px;transition:all var(--t)}
    .kc-modal-close:hover{border-color:var(--pk);color:var(--pk-dk);background:var(--pk-lt)}
    .kc-modal-body{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
    .kc-field{display:flex;flex-direction:column;gap:5px}
    .kc-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3)}
    .kc-inp{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);background:var(--surface-2);outline:none;transition:all var(--t)}
    .kc-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);background:#fff}
    .kc-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kc-modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  </style>
</head>
<body>

  <div class="main-panel">
    <div class="kc-page-content">

      <nav class="kc-bc">
        <a href="../../index.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <span>Staff</span>
        <i class="fa-solid fa-chevron-right sep"></i>
        <span>Schedules</span>
      </nav>

      <div class="kc-card">
        <div class="kc-card-head">
          <div class="kc-head-left">
            <div class="kc-icon-wrap"><i class="fa-solid fa-calendar-week"></i></div>
            <div class="kc-title">Staff Schedules <small>Weekly shift planner for all team members</small></div>
          </div>
          <div class="kc-head-right">
            <button class="kc-btn-out"><i class="fa-solid fa-file-export"></i> Export</button>
            <button class="kc-btn-gold" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Shift</button>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="kc-toolbar">
          <div class="kc-week-nav">
            <button class="kc-nav-arrow" onclick="KcozmAdmin.showToast('Previous week','info')"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="kc-week-label">10 – 16 Mar 2026</div>
            <button class="kc-nav-arrow" onclick="KcozmAdmin.showToast('Next week','info')"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
          <button class="kc-btn-today">Today</button>
          <select class="kc-staff-filter">
            <option value="">All Staff</option>
            <option>Aisha Khan</option>
            <option>Preethi Nair</option>
            <option>Roshni Gupta</option>
            <option>Sonal Mehta</option>
            <option>Divya Sharma</option>
            <option>Kavita Pillai</option>
            <option>Tanvi Joshi</option>
            <option>Meghna Rao</option>
          </select>
          <div class="kc-legend">
            <div class="kc-leg"><div class="kc-leg-dot" style="background:var(--gold)"></div> Working</div>
            <div class="kc-leg"><div class="kc-leg-dot" style="background:#2196f3"></div> Half Day</div>
            <div class="kc-leg"><div class="kc-leg-dot" style="background:var(--pk)"></div> Leave</div>
            <div class="kc-leg"><div class="kc-leg-dot" style="background:var(--border)"></div> Off</div>
          </div>
        </div>

        <!-- Schedule grid -->
        <div class="kc-sched-wrap">
          <div class="kc-sched" id="schedGrid"></div>
        </div>

      </div><!-- /kc-card -->
    </div>
  </div>

  <!-- Add Shift Modal -->
  <div class="kc-modal-ov" id="modalOv" onclick="if(event.target===this)closeModal()">
    <div class="kc-modal">
      <div class="kc-modal-head">
        <div class="kc-modal-title">Add / Edit Shift</div>
        <button class="kc-modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="kc-modal-body">
        <div class="kc-field"><label class="kc-lbl">Staff Member</label>
          <select class="kc-inp">
            <option value="">Select staff…</option>
            <option>Aisha Khan</option><option>Preethi Nair</option>
            <option>Roshni Gupta</option><option>Sonal Mehta</option>
            <option>Divya Sharma</option><option>Kavita Pillai</option>
            <option>Tanvi Joshi</option><option>Meghna Rao</option>
          </select>
        </div>
        <div class="kc-field"><label class="kc-lbl">Date</label><input class="kc-inp" type="date" value="2026-03-14"></div>
        <div class="kc-field"><label class="kc-lbl">Shift Type</label>
          <select class="kc-inp">
            <option value="work">Full Day (Working)</option>
            <option value="half">Half Day</option>
            <option value="leave">Leave / Holiday</option>
            <option value="off">Day Off</option>
          </select>
        </div>
        <div class="kc-row2">
          <div class="kc-field"><label class="kc-lbl">Start Time</label><input class="kc-inp" type="time" value="09:00"></div>
          <div class="kc-field"><label class="kc-lbl">End Time</label><input class="kc-inp" type="time" value="18:00"></div>
        </div>
        <div class="kc-field"><label class="kc-lbl">Branch</label>
          <select class="kc-inp">
            <option>Pune West</option><option>Mumbai Andheri</option><option>Nagpur Central</option>
          </select>
        </div>
        <div class="kc-field"><label class="kc-lbl">Notes (optional)</label>
          <input class="kc-inp" type="text" placeholder="e.g. Half day – appointment only">
        </div>
      </div>
      <div class="kc-modal-foot">
        <button class="kc-btn-out" onclick="closeModal()">Cancel</button>
        <button class="kc-btn-gold" onclick="closeModal();KcozmAdmin.showToast('Shift saved successfully!','success')">
          <i class="fa-solid fa-floppy-disk"></i> Save Shift
        </button>
      </div>
    </div>
  </div>

  <script src="../../js/shared-components.js"></script>
  <script>
    KcozmAdmin.init({ activePage:'staff-schedule', pageTitle:'Schedules', depth:'../../' });

    const DAYS=[
      {name:'Mon',date:'10',today:false},
      {name:'Tue',date:'11',today:false},
      {name:'Wed',date:'12',today:false},
      {name:'Thu',date:'13',today:false},
      {name:'Fri',date:'14',today:true},
      {name:'Sat',date:'15',today:false},
      {name:'Sun',date:'16',today:false},
    ];

    const COLORS=['#c8a040','#e91e63','#2196f3','#4caf50','#9c27b0','#ff5722','#009688','#3f51b5'];

    // W=work, H=half, L=leave, O=off
    const STAFF=[
      {name:'Aisha Khan',    role:'Sr. Stylist',  sched:['W','W','W','W','W','O','O']},
      {name:'Preethi Nair',  role:'Makeup Artist',sched:['W','W','O','W','W','W','O']},
      {name:'Roshni Gupta',  role:'Hair Stylist', sched:['O','W','W','W','W','W','H']},
      {name:'Sonal Mehta',   role:'Skin Therapist',sched:['W','W','W','O','W','W','O']},
      {name:'Divya Sharma',  role:'Nail Tech',    sched:['L','L','L','L','L','L','L']},
      {name:'Kavita Pillai', role:'Sr. Stylist',  sched:['W','W','W','W','H','W','O']},
      {name:'Tanvi Joshi',   role:'Receptionist', sched:['W','W','W','W','W','W','O']},
      {name:'Meghna Rao',    role:'Makeup Artist',sched:['L','L','L','L','L','L','L']},
    ];

    const shiftLabel={
      W:{cls:'work',  text:'9:00 – 18:00'},
      H:{cls:'half',  text:'9:00 – 13:00'},
      L:{cls:'leave', text:'On Leave'},
      O:{cls:'off-tag',text:'Day Off'},
    };

    function initials(n){return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}

    function buildGrid(){
      const g=document.getElementById('schedGrid');
      let html='';

      // Header
      html+=`<div class="kc-sh-corner">Staff / Day</div>`;
      DAYS.forEach(d=>{
        html+=`<div class="kc-sh-day${d.today?' today':''}">
          <div class="kc-sh-dayname">${d.name}</div>
          <div class="kc-sh-date">${d.date}</div>
        </div>`;
      });

      // Staff rows
      STAFF.forEach((s,si)=>{
        const av=COLORS[si%COLORS.length];
        html+=`<div class="kc-srow-label">
          <div class="kc-srow-av" style="background:${av}">${initials(s.name)}</div>
          <div><div class="kc-srow-name">${s.name}</div><div class="kc-srow-role">${s.role}</div></div>
        </div>`;
        s.sched.forEach((shift,di)=>{
          const sl=shiftLabel[shift];
          const isToday=DAYS[di].today;
          const isOff=(shift==='O'||shift==='L');
          html+=`<div class="kc-scell${isToday?' today':''}${isOff?' off':''}" onclick="${isOff?'':'openModal()'}">
            <div class="kc-shift ${sl.cls}">${sl.text}</div>
          </div>`;
        });
      });

      // Summary row
      html+=`<div class="kc-summ-label">Staff On Duty</div>`;
      DAYS.forEach((_,di)=>{
        const count=STAFF.filter(s=>s.sched[di]==='W'||s.sched[di]==='H').length;
        html+=`<div class="kc-summ-cell">${count} <span style="font-size:10px;color:var(--ink-3);font-weight:400">staff</span></div>`;
      });

      g.innerHTML=html;
    }

    function openModal(){document.getElementById('modalOv').classList.add('show');document.body.style.overflow='hidden';}
    function closeModal(){document.getElementById('modalOv').classList.remove('show');document.body.style.overflow='';}

    buildGrid();
  </script>
</body>
</html>
