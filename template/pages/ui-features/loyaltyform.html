<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>KCOZM — Loyalty Card Form</title>
  <!-- ═══ FAVICON ═══ -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../../images/favicon.png" />
  <style>
    :root {
      --gold:#c8a040; --gold-dk:#9a7020; --gold-lt:#fdf8ee;
      --pink:#e91e63; --pink-dk:#c2185b; --pink-lt:#fce4ec;
      --ink:#1a1410; --ink-2:#3d3028; --ink-3:#8a7060;
      --surface:#fff; --surface-2:#f9f7f5; --border:#e8e2da; --shadow:0 2px 24px rgba(26,18,8,.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--surface-2);color:var(--ink)}
    .main-panel{min-width:0;overflow-x:hidden}
    .kc-page-content{padding:28px 28px 48px;flex:1;width:100%;min-width:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .kc-bc{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);margin-bottom:22px;animation:fadeUp .4s ease both}
    .kc-bc a{color:var(--gold);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;box-shadow:var(--shadow);animation:fadeUp .45s ease both}
    .form-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--ink);margin-bottom:4px}
    .form-sub{font-size:13px;color:var(--ink-3);margin-bottom:28px}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-bottom:18px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3)}
    .form-input{padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);background:var(--surface);outline:none;transition:all .18s}
    .form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,160,64,.18);background:#fff}
    .form-input::placeholder{color:var(--ink-3)}
    textarea.form-input{font-family:'DM Sans',sans-serif}
    .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:28px;padding-top:28px;border-top:1px solid var(--border)}
    .btn{padding:11px 24px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dk));color:#fff;box-shadow:0 4px 14px rgba(200,160,64,.28)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(200,160,64,.45)}
    .btn-secondary{background:transparent;border:1.5px solid var(--border);color:var(--ink-2)}
    .btn-secondary:hover{border-color:var(--gold);background:var(--gold-lt);color:var(--gold-dk)}
    @media(max-width:600px){.form-card{padding:20px 22px}.form-row{grid-template-columns:1fr}.form-actions{flex-direction:column-reverse}}
  </style>
</head>
<body>
  <div class="main-panel">
    <div class="kc-page-content">
      <nav class="kc-bc">
        <a href="../../index.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <a href="loyalty.html"><i class="fa-solid fa-id-card"></i> Loyalty Cards</a>
        <i class="fa-solid fa-chevron-right sep"></i>
        <span>Add Loyalty Card</span>
      </nav>

      <div class="form-card">
        <h1 class="form-title"><i class="fa-solid fa-id-card" style="color:var(--gold);margin-right:10px;font-size:22px"></i>Add Loyalty Card</h1>
        <p class="form-sub">Create a new loyalty card program for your customers</p>

        <form class="form-wrapper" onsubmit="handleAddLoyalty(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Card Name</label>
              <input type="text" class="form-input" id="cardName" placeholder="e.g. Premium Care Plus, Royal Beauty Card" required>
            </div>
            <div class="form-group">
              <label class="form-label">Card Code</label>
              <input type="text" class="form-input" id="cardCode" placeholder="e.g. PREM001, ROYAL001" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Points Per Rupee</label>
              <input type="number" class="form-input" id="pointsPerRupee" placeholder="e.g. 1, 2, 5" step="0.1" required>
            </div>
            <div class="form-group">
              <label class="form-label">Redemption Rate (₹ per point)</label>
              <input type="number" class="form-input" id="redemptionRate" placeholder="e.g. 1, 2, 5" step="0.1" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-input" id="description" placeholder="e.g. Earn points on every purchase and redeem for discounts..." style="resize:vertical;min-height:100px" required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Minimum Purchase (₹)</label>
              <input type="number" class="form-input" id="minPurchase" placeholder="e.g. 500, 1000" min="0" required>
            </div>
            <div class="form-group">
              <label class="form-label">Validity (Months)</label>
              <input type="number" class="form-input" id="validity" placeholder="e.g. 12, 24, 36" min="1" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Color Theme</label>
              <select class="form-input" id="colorTheme" required>
                <option value="">Select a color...</option>
                <option value="gold">Gold</option>
                <option value="pink">Pink</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="purple">Purple</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-input" id="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="draft">Draft</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="window.location.href='loyalty.html'">Cancel</button>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Loyalty Card</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../js/shared-components.js"></script>
  <script>
    KcozmAdmin.init({ activePage:'loyalty', pageTitle:'Add Loyalty Card', depth:'../../', addButton:'Back to List', addButtonHref:'loyalty.html' });

    function handleAddLoyalty(event) {
      event.preventDefault();
      const cardName = document.getElementById('cardName').value.trim();
      const cardCode = document.getElementById('cardCode').value.trim();
      const pointsPerRupee = document.getElementById('pointsPerRupee').value;
      const redemptionRate = document.getElementById('redemptionRate').value;
      const description = document.getElementById('description').value.trim();
      const minPurchase = document.getElementById('minPurchase').value;
      const validity = document.getElementById('validity').value;
      const colorTheme = document.getElementById('colorTheme').value;
      const status = document.getElementById('status').value;

      if (!cardName || !cardCode || !pointsPerRupee || !redemptionRate || !description || !minPurchase || !validity || !colorTheme || !status) {
        KcozmAdmin.showToast('Please fill all fields', 'error');
        return;
      }

      const newLoyalty = {
        id: Date.now(),
        name: cardName,
        code: cardCode,
        pointsPerRupee: parseFloat(pointsPerRupee),
        redemptionRate: parseFloat(redemptionRate),
        description: description,
        minPurchase: parseInt(minPurchase),
        validity: parseInt(validity),
        colorTheme: colorTheme,
        status: status,
        createdAt: new Date().toISOString()
      };

      let loyalties = JSON.parse(localStorage.getItem('loyalties')) || [];
      loyalties.push(newLoyalty);
      localStorage.setItem('loyalties', JSON.stringify(loyalties));

      KcozmAdmin.showToast('Loyalty card added successfully!', 'success');
      setTimeout(() => window.location.href = 'loyalty.html', 800);
    }
  </script>
</body>
</html>
