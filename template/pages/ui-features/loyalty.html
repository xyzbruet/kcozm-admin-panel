<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>KCOZM — Loyalty Cards</title>
  <link rel="shortcut icon" href="../../images/favicon.png" />
  <style>
    .kc-page{padding:24px 28px 32px}
    .kc-anim{opacity:0;transform:translateY(14px);animation:kcRise .4s ease forwards}
    @keyframes kcRise{to{opacity:1;transform:none}}
    .kc-pg-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-page);overflow:hidden}
    .kc-pg-head{padding:20px 24px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
    .kc-pg-title-wrap{display:flex;align-items:center;gap:12px}
    .kc-pg-icon{width:40px;height:40px;border-radius:11px;background:var(--gold-lt);color:var(--gold-dk);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .kc-pg-title{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:700;color:var(--ink)}
    .kc-pg-sub{font-size:12px;color:var(--ink-3);margin-top:1px}
    .kc-pg-actions{display:flex;align-items:center;gap:10px}
    .kc-search-wrap{position:relative}
    .kc-search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:13px;pointer-events:none}
    .kc-search{padding:9px 16px 9px 36px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface-2);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--ink);width:220px;outline:none}
    .kc-search:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,160,64,.12)}
    .kc-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;border:none;text-decoration:none}
    .kc-btn-gold{background:linear-gradient(135deg,#c8a040,#9a7020);color:#fff;box-shadow:0 3px 12px rgba(200,160,64,.28)}
    .kc-btn-gold:hover{box-shadow:0 5px 18px rgba(200,160,64,.40);transform:translateY(-1px);color:#fff}
    .kc-btn-rose{background:linear-gradient(135deg,#c97b84,#a85560);color:#fff;box-shadow:0 3px 12px rgba(201,123,132,.25)}
    .kc-btn-rose:hover{box-shadow:0 5px 18px rgba(201,123,132,.38);transform:translateY(-1px);color:#fff}
    .kc-btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink-2)}
    .kc-btn-outline:hover{border-color:var(--gold);color:var(--gold-dk);background:var(--gold-lt)}

    /* Loyalty card grid */
    .kc-lc-grid{padding:22px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}

    .kc-lc{border-radius:16px;overflow:hidden;position:relative;box-shadow:0 4px 20px rgba(24,18,12,.10);transition:transform .2s,box-shadow .2s;cursor:pointer}
    .kc-lc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(24,18,12,.15)}
    .kc-lc-bg{padding:22px 20px 18px;background:linear-gradient(135deg,#1d1108 0%,#2a1a08 60%,#1a1006 100%);position:relative;overflow:hidden}
    .kc-lc-bg::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(200,160,64,.20) 0%,transparent 70%);pointer-events:none}
    .kc-lc-brand{font-family:"Cormorant Garamond",serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(200,160,64,.75);margin-bottom:10px}
    .kc-lc-heading{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.2}
    .kc-lc-points{font-size:12px;color:rgba(238,218,185,.55);margin-bottom:14px}
    .kc-lc-bar-wrap{height:4px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}
    .kc-lc-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#c8a040,#e8c060)}
    .kc-lc-body{padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px}
    .kc-lc-desc{font-size:12.5px;color:var(--ink-3);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
    .kc-lc-footer{display:flex;align-items:center;justify-content:space-between}
    .kc-lc-badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--gold-lt);color:var(--gold-dk)}
    .kc-lc-actions{display:flex;gap:6px}
    .kc-act-btn{width:30px;height:30px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .15s}
    .kc-act-btn.edit{background:#e8f5e9;color:#2e7d32}
    .kc-act-btn.delete{background:#fce4ec;color:#c62828}
    .kc-act-btn:hover{transform:scale(1.10)}

    /* Inline form */
    .kc-inline{padding:22px 24px;border-bottom:1px solid var(--border);background:var(--surface-2);display:none}
    .kc-inline.open{display:block}
    .kc-if-title{font-family:"Cormorant Garamond",serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .kc-form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px}
    @media(max-width:720px){.kc-form-row{grid-template-columns:1fr}}
    .kc-fg{display:flex;flex-direction:column;gap:7px}
    .kc-fg.full{grid-column:1/-1}
    .kc-label{font-size:12.5px;font-weight:600;color:var(--ink-2)}
    .kc-input,.kc-textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);font-family:"DM Sans",sans-serif;font-size:13.5px;color:var(--ink);outline:none;transition:border-color .18s;width:100%}
    .kc-input:focus,.kc-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,160,64,.12)}
    .kc-textarea{resize:vertical;min-height:80px}
    .kc-form-footer{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding-top:18px;border-top:1px solid var(--border);margin-top:18px}

    .kc-pg-info{font-size:12.5px;color:var(--ink-3);padding:16px 24px;border-top:1px solid var(--border)}
    .kc-empty{padding:52px 20px;text-align:center}
  </style>
</head>
<body>
  <div class="main-panel">
    <div class="kc-page">
      <div class="kc-pg-card kc-anim" style="animation-delay:.05s">

        <div class="kc-pg-head">
          <div class="kc-pg-title-wrap">
            <div class="kc-pg-icon"><i class="fa-solid fa-id-card"></i></div>
            <div>
              <div class="kc-pg-title">Loyalty Cards</div>
              <div class="kc-pg-sub">Create and manage client loyalty programmes</div>
            </div>
          </div>
          <div class="kc-pg-actions">
            <div class="kc-search-wrap">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" class="kc-search" placeholder="Search cards…" id="lcSearch">
            </div>
            <button class="kc-btn kc-btn-gold" id="toggleLC"><i class="fa-solid fa-plus"></i> New Card</button>
          </div>
        </div>

        <!-- Inline form -->
        <div class="kc-inline" id="lcForm">
          <div class="kc-if-title"><i class="fa-solid fa-id-card-clip" style="color:var(--gold-dk)"></i> Create Loyalty Card</div>
          <div class="kc-form-row">
            <div class="kc-fg">
              <label class="kc-label">Card Heading</label>
              <input type="text" class="kc-input" id="lcHeading" placeholder="e.g. Gold Member, Platinum Elite…">
            </div>
            <div class="kc-fg">
              <label class="kc-label">Points Required</label>
              <input type="number" class="kc-input" id="lcPoints" placeholder="e.g. 500">
            </div>
            <div class="kc-fg full">
              <label class="kc-label">Card Description</label>
              <textarea class="kc-textarea" id="lcDesc" placeholder="Describe the benefits and rewards for this loyalty tier…"></textarea>
            </div>
          </div>
          <div class="kc-form-footer">
            <button class="kc-btn kc-btn-outline" id="cancelLC">Cancel</button>
            <button class="kc-btn kc-btn-rose" id="saveLC"><i class="fa-solid fa-check"></i> Create Card</button>
          </div>
        </div>

        <!-- Cards grid -->
        <div class="kc-lc-grid" id="lcGrid"></div>
        <div class="kc-pg-info" id="lcInfo"></div>

      </div>
    </div>
  </div>

  <script src="../../js/shared-components.js"></script>
  <script>
    KcozmAdmin.init({ activePage:'more-pages', depth:'../../' });

    var cards = JSON.parse(localStorage.getItem('kc_loyalty')) || [
      {id:1,heading:'Silver Member',points:200,desc:'Enjoy 5% off on all services. Free consultations and priority booking for our valued Silver members.',pct:33},
      {id:2,heading:'Gold Member',points:500,desc:'Exclusive 12% discount, complimentary hair wash on every visit, and birthday special treatment.',pct:65},
      {id:3,heading:'Platinum Elite',points:1000,desc:'Premium 20% discount on all services, free monthly facial, personal stylist assignment, and VIP lounge access.',pct:90}
    ];

    function renderCards(data){
      var g=document.getElementById('lcGrid');
      document.getElementById('lcInfo').innerHTML='<b>'+data.length+'</b> loyalty card'+(data.length!==1?'s':'')+' configured';
      if(!data.length){g.innerHTML='<div class="kc-empty" style="grid-column:1/-1"><i class="fa-solid fa-id-card" style="font-size:32px;color:var(--border);display:block;margin-bottom:10px"></i><div style="font-size:14px;color:var(--ink-3)">No loyalty cards yet. Create one above.</div></div>';return;}
      g.innerHTML=data.map(function(c){
        return '<div class="kc-lc">'
          +'<div class="kc-lc-bg">'
            +'<div class="kc-lc-brand">KCOZM — The Luxury Salon</div>'
            +'<div class="kc-lc-heading">'+c.heading+'</div>'
            +'<div class="kc-lc-points">'+c.points+' pts required</div>'
            +'<div class="kc-lc-bar-wrap"><div class="kc-lc-bar" style="width:'+c.pct+'%"></div></div>'
          +'</div>'
          +'<div class="kc-lc-body">'
            +'<div class="kc-lc-desc">'+c.desc+'</div>'
            +'<div class="kc-lc-footer">'
              +'<span class="kc-lc-badge"><i class="fa-solid fa-star" style="margin-right:4px"></i>'+c.points+' pts</span>'
              +'<div class="kc-lc-actions">'
                +'<button class="kc-act-btn edit" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>'
                +'<button class="kc-act-btn delete" title="Delete" onclick="delCard('+c.id+')"><i class="fa-solid fa-trash"></i></button>'
              +'</div>'
            +'</div>'
          +'</div>'
        +'</div>';
      }).join('');
    }
    renderCards(cards);

    function delCard(id){ if(!confirm('Delete this loyalty card?')) return; cards=cards.filter(function(c){return c.id!==id;}); localStorage.setItem('kc_loyalty',JSON.stringify(cards)); renderCards(cards); }

    document.getElementById('toggleLC').addEventListener('click',function(){ document.getElementById('lcForm').classList.toggle('open'); });
    document.getElementById('cancelLC').addEventListener('click',function(){ document.getElementById('lcForm').classList.remove('open'); });

    document.getElementById('saveLC').addEventListener('click',function(){
      var h=document.getElementById('lcHeading').value.trim();
      var d=document.getElementById('lcDesc').value.trim();
      var p=parseInt(document.getElementById('lcPoints').value)||0;
      if(!h||!d){KcozmAdmin.showToast('Please fill all fields','error');return;}
      var maxPts=1200; var pct=Math.min(100,Math.round(p/maxPts*100));
      cards.push({id:Date.now(),heading:h,points:p,desc:d,pct:pct});
      localStorage.setItem('kc_loyalty',JSON.stringify(cards)); renderCards(cards);
      document.getElementById('lcForm').classList.remove('open');
      document.getElementById('lcHeading').value=''; document.getElementById('lcDesc').value=''; document.getElementById('lcPoints').value='';
      KcozmAdmin.showToast('Loyalty card created','success');
    });

    document.getElementById('lcSearch').addEventListener('input',function(){
      var q=this.value.toLowerCase();
      renderCards(cards.filter(function(c){return c.heading.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q);}));
    });
  </script>
</body>
</html>
