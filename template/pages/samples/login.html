<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>KCOZM Admin — Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../../images/favicon.png" />
  <style>
    :root {
      --gold:#c8a040; --gold-dk:#a07828; --gold-lt:#fdf8ee; --gold-border:#f0e8d0;
      --pk:#e91e63;
      --ink:#1a1410; --ink-3:#8a7060;
      --surface:#fff; --surface-2:#f9f7f5;
      --shadow:0 12px 48px rgba(160,120,40,0.18);
    }
    body {
      margin: 0; padding: 0;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--surface-2) 0%, #ebe2d3 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .kc-login-wrap {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 40px 48px;
      width: 100%; max-width: 440px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .kc-logo {
      height: 60px; margin-bottom: 24px;
    }
    .kc-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 700; color: var(--ink);
      margin: 0 0 8px;
    }
    .kc-sub {
      font-size: 13.5px; color: var(--ink-3); margin-bottom: 32px;
    }
    .kc-field {
      text-align: left; margin-bottom: 18px; position: relative;
    }
    .kc-field label {
      display: block; font-size: 11px; font-weight: 700; color: var(--ink-3);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }
    .kc-inp {
      width: 100%; padding: 12px 16px 12px 42px;
      border: 1.5px solid var(--gold-border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      background: var(--surface-2); outline: none; transition: all 0.2s;
      box-sizing: border-box;
    }
    .kc-inp:focus {
      border-color: var(--gold); background: #fff;
    }
    .kc-field i {
      position: absolute; left: 16px; top: 38px; color: var(--gold-dk); font-size: 14px;
    }
    .kc-btn {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14.5px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px; box-shadow: 0 4px 16px rgba(200,160,64,0.3);
    }
    .kc-btn:hover {
      transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,160,64,0.4);
    }
  </style>
</head>
<body>
  <div class="kc-login-wrap">
    <img src="../../images/logo.png" alt="KCOZM Logo" class="kc-logo">
    <h1 class="kc-title">Welcome Back</h1>
    <p class="kc-sub">Sign in to the KCOZM Admin Dashboard</p>
    
    <div class="kc-field">
      <label>Email Address</label>
      <i class="fa-solid fa-envelope"></i>
      <input type="email" class="kc-inp" placeholder="admin@kcozm.com" value="admin@kcozm.com">
    </div>
    <div class="kc-field">
      <label>Password</label>
      <i class="fa-solid fa-lock"></i>
      <input type="password" class="kc-inp" placeholder="••••••••" value="password123">
    </div>
    
    <button class="kc-btn" onclick="window.location.href='../../index.html'">Sign In</button>
  </div>
</body>
</html>
