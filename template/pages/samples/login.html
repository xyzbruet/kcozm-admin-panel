<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KCOZM — Admin Login</title>
  <link rel="shortcut icon" href="../../images/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Mulish:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #b8900a;
      --gold-lt: #d4a820;
      --gold-dk: #8a6808;
      --cream: #f5f0e8;
      --cream-2: #ede5d0;
      --cream-3: #e8dfc8;
      --white: #ffffff;
      --border: #e2d5b0;
      --ink: #1a1408;
      --ink-3: #7a6830;
      --ink-4: #b0a070;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Mulish', sans-serif;
      display: flex;
      height: 100vh;
      background: var(--white);
    }

    /* ═══════════════════════════════════
       LEFT — BRAND PANEL
    ═══════════════════════════════════ */
    .p-brand {
      flex: 0 0 38%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      /* space between ring-wrap and quote */
      background: var(--white);
      overflow: hidden;
      padding: 32px 24px;
    }

    /* dot pattern */
    .p-brand::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(184, 144, 10, 0.18) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* corner brackets */
    .brk {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: rgba(184, 144, 10, 0.35);
      border-style: solid;
      z-index: 2;
    }

    .brk-tl {
      top: 20px;
      left: 20px;
      border-width: 1.5px 0 0 1.5px;
    }

    .brk-tr {
      top: 20px;
      right: 20px;
      border-width: 1.5px 1.5px 0 0;
    }

    .brk-bl {
      bottom: 20px;
      left: 20px;
      border-width: 0 0 1.5px 1.5px;
    }

    .brk-br {
      bottom: 20px;
      right: 20px;
      border-width: 0 1.5px 1.5px 0;
    }

    /* ─────────────────────────────────
       RING WRAP — self-contained box
       Rings live HERE, logo centered inside
    ───────────────────────────────── */
    .ring-wrap {
      position: relative;
      /* size = innermost ring diameter */
      width: 260px;
      height: 260px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeRise .9s .05s cubic-bezier(.22, .68, .36, 1) both;
      opacity: 0;
      z-index: 3;
    }

    /* Inner ring — fills ring-wrap exactly */
    .dring-2 {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px dashed rgba(139, 104, 8, 0.72);
      animation: spinRing 28s linear infinite reverse;
      pointer-events: none;
    }

    /* Outer ring — larger, overflows ring-wrap (clipped by p-brand overflow:hidden) */
    .dring-3 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px dashed rgba(184, 144, 10, 0.38);
      animation: spinRing 45s linear infinite;
      pointer-events: none;
    }

    /* soft glow behind logo */
    .ring-glow {
      position: absolute;
      inset: 30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184, 144, 10, 0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* LOGO — sits on top, centered in ring-wrap */
    .brand-logo {
      position: relative;
      z-index: 2;
      width: 180px;
      max-width: 65%;
      filter: drop-shadow(0 4px 16px rgba(120, 96, 8, 0.24));
    }

    /* ─────────────────────────────────
       QUOTE — sits BELOW the ring-wrap
    ───────────────────────────────── */
    .brand-quote-block {
      text-align: center;
      animation: fadeRise .9s .2s cubic-bezier(.22, .68, .36, 1) both;
      opacity: 0;
      z-index: 3;
    }

    .deco {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      width: 150px;
      margin-left: auto;
      margin-right: auto;
    }

    .deco-l {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(184, 144, 10, 0.5));
    }

    .deco-r {
      flex: 1;
      height: 1px;
      background: linear-gradient(to left, transparent, rgba(184, 144, 10, 0.5));
    }

    .deco-gem {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .brand-quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.85;
      max-width: 210px;
    }

    /* vertical separator */
    .sep {
      flex-shrink: 0;
      width: 1px;
      background: linear-gradient(to bottom,
          transparent 0%, var(--gold-dk) 25%,
          var(--gold-lt) 50%, var(--gold-dk) 75%, transparent 100%);
      position: relative;
    }

    .sep::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 7px;
      height: 7px;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(200, 160, 40, 0.6);
    }

    /* ═══════════════════════════════════
       RIGHT — FORM PANEL
    ═══════════════════════════════════ */
    .p-form {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      position: relative;
      overflow: hidden;
      padding: 36px 60px;
    }

    .p-form::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(184, 144, 10, 0.10) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.28;
      pointer-events: none;
    }

    .form-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      animation: fadeRise .9s .15s cubic-bezier(.22, .68, .36, 1) both;
      opacity: 0;
    }

    .form-card {
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 30px 34px 26px;
      position: relative;
      box-shadow: 0 4px 28px rgba(120, 96, 8, 0.10), 0 1px 4px rgba(120, 96, 8, 0.06);
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 28px;
      right: 28px;
      height: 2.5px;
      background: linear-gradient(to right, transparent, var(--gold-lt), transparent);
      border-radius: 2px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 18px;
      height: 1.5px;
      background: var(--gold);
      border-radius: 2px;
    }

    .ftitle {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .ftitle em {
      font-style: italic;
      font-weight: 500;
      color: var(--gold);
    }

    .title-rule {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 8px;
    }

    .title-rule::before {
      content: '';
      flex: 0 0 32px;
      height: 1px;
      background: var(--gold-dk);
    }

    .title-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-3);
    }

    .title-rule-gem {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .fsub {
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.65;
      margin-bottom: 18px;
    }

    .fields-section {
      border-top: 1px solid var(--cream-3);
      padding-top: 16px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-of-type {
      margin-bottom: 0;
    }

    .flabel {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 6px;
      transition: color .2s;
    }

    .field:focus-within .flabel {
      color: var(--gold);
    }

    .fw {
      position: relative;
    }

    .ficon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--gold-dk);
      pointer-events: none;
      transition: color .2s;
    }

    .field:focus-within .ficon {
      color: var(--gold);
    }

    .finput {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-family: 'Mulish', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }

    .finput::placeholder {
      color: var(--ink-4);
      font-weight: 400;
    }

    .finput:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184, 144, 10, 0.10);
    }

    .eye-btn {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-4);
      font-size: 13px;
      padding: 4px;
      transition: color .2s;
    }

    .eye-btn:hover {
      color: var(--gold);
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .forgot {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--gold-dk);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s, color .2s;
    }

    .forgot:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    .card-divider {
      height: 1px;
      background: var(--cream-3);
      margin: 18px 0;
    }

    .cta {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(110deg, #c9a218 0%, #9a7808 100%);
      font-family: 'Mulish', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #fff;
      transition: transform .2s, box-shadow .2s, filter .2s;
      box-shadow: 0 6px 24px rgba(184, 144, 10, 0.30);
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 55%);
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(184, 144, 10, 0.40);
      filter: brightness(1.06);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta.loading {
      pointer-events: none;
      opacity: .85;
    }

    .cta-text {
      position: relative;
      z-index: 1;
      transition: opacity .15s;
    }

    .cta-spin {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 2;
      align-items: center;
      justify-content: center;
    }

    .cta.loading .cta-text {
      opacity: 0;
    }

    .cta.loading .cta-spin {
      display: flex;
    }

    .spin-ring {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--cream-3);
    }

    .secured-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-bottom: 4px;
      justify-content: center;
    }

    .secured-row i {
      color: var(--gold-dk);
      font-size: 11px;
    }

    .ssl-txt {
      font-size: 10px;
      color: var(--ink-4);
      text-align: center;
      display: block;
    }

    /* ═══════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════ */
    @keyframes fadeRise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spinRing {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes spinRingInset {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Fix: dring-2 uses inset:0 so needs different keyframe */
    .dring-2 {
      animation-name: spinRingInset;
    }

    /* ═══════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════ */
    @media (max-width: 1100px) {
      .p-brand {
        flex: 0 0 34%;
        gap: 20px;
      }

      .p-form {
        padding: 28px 36px;
      }

      .ring-wrap {
        width: 230px;
        height: 230px;
      }

      .dring-3 {
        width: 306px;
        height: 306px;
      }

      .brand-logo {
        width: 155px;
      }
    }

    @media (max-width: 768px) {

      html,
      body {
        height: auto;
        overflow: auto;
      }

      body {
        flex-direction: column;
        min-height: 100vh;
      }

      .sep {
        width: 100%;
        height: 1px;
        flex-shrink: 0;
        background: linear-gradient(to right, transparent, var(--gold), transparent);
      }

      .sep::before {
        top: 50%;
        left: 50%;
      }

      .p-brand {
        flex: none;
        padding: 40px 24px 32px;
        gap: 18px;
      }

      .ring-wrap {
        width: 200px;
        height: 200px;
      }

      .dring-3 {
        width: 266px;
        height: 266px;
      }

      .brand-logo {
        width: 134px;
      }

      .brand-quote {
        font-size: 12px;
      }

      .p-form {
        padding: 32px 24px 44px;
        overflow: visible;
      }

      .form-card {
        padding: 22px 20px 20px;
      }

      .ftitle {
        font-size: 32px;
      }
    }

    @media (max-width: 480px) {
      .p-brand {
        padding: 32px 16px 28px;
        gap: 14px;
      }

      .ring-wrap {
        width: 166px;
        height: 166px;
      }

      .dring-3 {
        width: 220px;
        height: 220px;
      }

      .brand-logo {
        width: 110px;
      }

      .brand-quote {
        font-size: 11px;
        max-width: 180px;
      }

      .p-form {
        padding: 20px 14px 32px;
      }

      .form-card {
        padding: 18px 14px 16px;
        border-radius: 14px;
      }

      .ftitle {
        font-size: 26px;
      }

      .finput {
        font-size: 13px;
        padding: 11px 12px 11px 40px;
      }

      .cta {
        font-size: 10px;
        letter-spacing: 4px;
        padding: 13px;
      }
    }

    @media (max-width: 360px) {
      .ring-wrap {
        width: 144px;
        height: 144px;
      }

      .dring-3 {
        width: 192px;
        height: 192px;
      }

      .brand-logo {
        width: 94px;
      }

      .ftitle {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <!-- ══ LEFT — BRAND ══ -->
  <div class="p-brand">
    <div class="brk brk-tl"></div>
    <div class="brk brk-tr"></div>
    <div class="brk brk-bl"></div>
    <div class="brk brk-br"></div>

    <!-- RING WRAP: logo perfectly centered, rings orbit around it -->
    <div class="ring-wrap">
      <div class="ring-glow"></div>
      <div class="dring-2"></div> <!-- inner ring = 260px, same as wrap -->
      <div class="dring-3"></div> <!-- outer ring = 340px, overflows wrap -->
      <img class="brand-logo" src="../../images/logo.png" alt="KCOZM The Luxury Salon">
    </div>

    <!-- QUOTE: completely below the ring -->
    <div class="brand-quote-block">
      <div class="deco">
        <div class="deco-l"></div>
        <div class="deco-gem"></div>
        <div class="deco-r"></div>
      </div>
      <p class="brand-quote">"Where luxury meets artistry,<br>every visit is a ritual."</p>
    </div>
  </div>

  <!-- ══ SEPARATOR ══ -->
  <div class="sep"></div>

  <!-- ══ RIGHT — FORM ══ -->
  <div class="p-form">
    <div class="form-inner">
      <div class="form-card">

        <div class="eyebrow">Admin Portal</div>
        <h1 class="ftitle">Welcome <em>Back</em></h1>
        <div class="title-rule">
          <div class="title-rule-gem"></div>
        </div>
        <p class="fsub">Sign in to access your KCOZM dashboard and manage your luxury salon experience.</p>

        <div class="fields-section">
          <div class="field">
            <label class="flabel">Email Address</label>
            <div class="fw">
              <i class="fa-solid fa-envelope ficon"></i>
              <input type="email" id="email" class="finput" placeholder="admin@kcozm.com" value="admin@kcozm.com">
            </div>
          </div>

          <div class="field">
            <label class="flabel">Password</label>
            <div class="fw">
              <i class="fa-solid fa-lock ficon"></i>
              <input type="password" id="pwd" class="finput" placeholder="••••••••••" value="password123"
                style="padding-right:46px;">
              <button class="eye-btn" type="button" onclick="togglePwd()">
                <i class="fa-solid fa-eye" id="eyeIco"></i>
              </button>
            </div>
          </div>

          <div class="forgot-row">
            <a href="#" class="forgot">Forgot password?</a>
          </div>
        </div>

        <div class="card-divider"></div>

        <button class="cta" id="ctaBtn" onclick="doLogin()">
          <span class="cta-text">Sign In</span>
          <span class="cta-spin">
            <div class="spin-ring"></div>
          </span>
        </button>

        <div class="card-footer">
          <div>
            <div class="secured-row">
              <i class="fa-solid fa-shield-halved"></i>
              Secured Access
            </div>
            <span class="ssl-txt">256-bit SSL encrypted · KCOZM Admin v2.0</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    function togglePwd() {
      const i = document.getElementById('pwd');
      const e = document.getElementById('eyeIco');
      i.type = i.type === 'password' ? 'text' : 'password';
      e.className = i.type === 'text' ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    }
    function doLogin() {
      const b = document.getElementById('ctaBtn');
      b.classList.add('loading');
      setTimeout(() => {
        b.classList.remove('loading');
        window.location.href = '../../index.html';
      }, 1800);
    }
  </script>
</body>

</html>
